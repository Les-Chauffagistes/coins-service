[tool.pytest.ini_options]
addopts = "-s"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
                                                                                                                         
[tool.coverage.run]                                                                                                    
source = ["src"]                                                                                                       
omit = [                                                                                                               
    "src/database/*",     # bootstrapping DB, nécessite infra réelle                                                 
    "src/settings.py",    # configuration pure                      
]                                                                                                                      
                                                                                                                        
[tool.coverage.report]                                                                                                 
exclude_lines = [                                                                                                      
    "pragma: no cover",                                                                                              
    "if __name__ == .__main__.:",                                                                                      
]